services:
  db:
    image: mysql:8.0
    container_name: mysql-db-8004
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - db_data_8004:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: django-app-8004
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8004:8004"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    command: gunicorn ecommerce.wsgi:application --bind 0.0.0.0:8004

volumes:
  db_data_8004:
